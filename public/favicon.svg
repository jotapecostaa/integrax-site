<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Top-left to bottom-right diagonal line -->
  <line x1="16" y1="16" x2="48" y2="48" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <!-- Top-right to bottom-left diagonal line -->
  <line x1="48" y1="16" x2="16" y2="48" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <!-- Dots at corners -->
  <circle cx="16" cy="16" r="4" fill="#2563EB"/>
  <circle cx="48" cy="16" r="4" fill="#2563EB"/>
  <circle cx="16" cy="48" r="4" fill="#2563EB"/>
  <circle cx="48" cy="48" r="4" fill="#2563EB"/>
</svg>
